spring:
  datasource:
    # URL, username and password are overridden at runtime by @DynamicPropertySource
    # in PatientIntegrationTest (Testcontainers supplies the real values).
    url: jdbc:postgresql://localhost:5432/medical_test
    username: test
    password: test
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
